# ─── Docker Image Publishing ─────────────────────────────────────────────────
# Builds container images, runs a basic smoke test, then pushes to GitHub
# Container Registry. A broken image never reaches :latest or :edge.
#
# Flow:  Build (local) → Start stack → Smoke test → Push
#
# Images published (only after smoke test passes):
#   ghcr.io/fortigi/identity-atlas         — Node.js API + React frontend (web service)
#   ghcr.io/fortigi/identity-atlas-worker  — PowerShell worker (crawlers, risk scoring)
#
# Tags pushed depend on the trigger:
#   main (via bump-version):  :edge  + Major.Minor.yyyyMMdd.HHmm
#   v* tag push:              :latest + Major.Minor.Patch.0
# ─────────────────────────────────────────────────────────────────────────────

name: Publish Docker Images

on:
  workflow_run:
    workflows: ["Bump version on PR merge"]
    types: [completed]
    # No branches filter: the filter matches the feature branch that triggered
    # bump-version (via pull_request), not main — so it would never fire.
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build from (e.g. main, v5.2.0)'
        required: true
        default: 'main'

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build, Test & Push Images
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Determine ref and channel
        id: config
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.ref }}"
          elif [ "$EVENT" = "push" ]; then
            # Tag push: github.ref_name = v5.2.0
            REF="${{ github.ref_name }}"
          else
            # workflow_run from bump-version: always build main (bump-version
            # only runs on PR merge to main, so the result always lands on main)
            REF="main"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

          if [[ "$REF" == v* ]]; then
            # Release tag: v5.2.0 → version 5.2.0.0
            VERSION="${REF#v}.0"
            echo "channel=release" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "use_tag_version=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=main" >> "$GITHUB_OUTPUT"
            echo "use_tag_version=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.config.outputs.ref }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ steps.config.outputs.use_tag_version }}" = "true" ]; then
            echo "version=${{ steps.config.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Version from tag: ${{ steps.config.outputs.version }}"
          else
            version=$(grep -oP "ModuleVersion\s*=\s*'\K[^']+" setup/IdentityAtlas.psd1)
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Version from psd1: $version"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build images locally (don't push yet) ───────────────────────
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/api/Dockerfile
          push: false
          load: true
          tags: identity-atlas-web:qa
          build-args: MODULE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./setup/docker/Dockerfile.powershell
          push: false
          load: true
          tags: identity-atlas-worker:qa
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      # ── Smoke test: start the stack and verify it boots ─────────────
      - name: Start stack
        run: |
          cat > docker-compose.qa.yml <<'EOF'
          services:
            postgres:
              image: postgres:16-alpine
              environment:
                POSTGRES_DB: identity_atlas
                POSTGRES_USER: identity_atlas
                POSTGRES_PASSWORD: qa_test
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U identity_atlas"]
                interval: 5s
                timeout: 3s
                retries: 20
            web:
              image: identity-atlas-web:qa
              environment:
                NODE_ENV: production
                USE_SQL: "true"
                DATABASE_URL: "postgres://identity_atlas:qa_test@postgres:5432/identity_atlas"
                AUTH_ENABLED: "false"
                PORT: "3001"
              ports: ["3001:3001"]
              depends_on:
                postgres: { condition: service_healthy }
          EOF
          docker compose -f docker-compose.qa.yml up -d

      - name: Wait for API ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/api/admin/status > /dev/null 2>&1; then
              echo "✅ API ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become ready within 120s"
          docker compose -f docker-compose.qa.yml logs web
          exit 1

      - name: Smoke test endpoints
        run: |
          FAILED=0
          for ep in /api/version /api/admin/status /api/systems /api/users?limit=1 /api/resources?limit=1 /api/permissions?userLimit=1 /api/openapi.json; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" "http://localhost:3001${ep}" || echo "000")
            if [ "$CODE" = "200" ]; then echo "✅ $ep"; else echo "❌ $ep → $CODE"; FAILED=$((FAILED+1)); fi
          done
          if [ $FAILED -gt 0 ]; then echo "::error::$FAILED endpoint(s) failed"; exit 1; fi

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.qa.yml down -v 2>/dev/null || true

      # ── Push images (only reached if smoke test passed) ─────────────
      - name: Push web image (release tag → latest)
        if: steps.config.outputs.channel == 'release'
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/fortigi/identity-atlas:latest
            ${{ env.REGISTRY }}/fortigi/identity-atlas:${{ steps.version.outputs.version }}
          build-args: MODULE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Push worker image (release tag → latest)
        if: steps.config.outputs.channel == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./setup/docker/Dockerfile.powershell
          push: true
          tags: |
            ${{ env.REGISTRY }}/fortigi/identity-atlas-worker:latest
            ${{ env.REGISTRY }}/fortigi/identity-atlas-worker:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Push web image (main → edge)
        if: steps.config.outputs.channel == 'main'
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/fortigi/identity-atlas:edge
            ${{ env.REGISTRY }}/fortigi/identity-atlas:${{ steps.version.outputs.version }}
          build-args: MODULE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Push worker image (main → edge)
        if: steps.config.outputs.channel == 'main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./setup/docker/Dockerfile.powershell
          push: true
          tags: |
            ${{ env.REGISTRY }}/fortigi/identity-atlas-worker:edge
            ${{ env.REGISTRY }}/fortigi/identity-atlas-worker:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
