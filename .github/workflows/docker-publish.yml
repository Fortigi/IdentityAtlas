# ─── Docker Image Publishing ─────────────────────────────────────────────────
# Builds and pushes container images to GitHub Container Registry (ghcr.io)
# on every push to main. This enables the production docker-compose.prod.yml
# which pulls pre-built images instead of building locally.
#
# Images published:
#   ghcr.io/fortigi/identity-atlas         — Node.js API + React frontend (web service)
#   ghcr.io/fortigi/identity-atlas-worker  — PowerShell worker (crawlers, risk scoring)
#
# Tags: latest + version from IdentityAtlas.psd1 (e.g., 4.0.20260403.1730)
# ─────────────────────────────────────────────────────────────────────────────

name: Publish Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        shell: bash
        run: |
          version=$(grep -oP "ModuleVersion\s*=\s*'\K[^']+" setup/IdentityAtlas.psd1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Module version: $version"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Web image (Node.js API + React frontend) ─────────────────────
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/fortigi/identity-atlas:latest
            ${{ env.REGISTRY }}/fortigi/identity-atlas:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      # ── Worker image (PowerShell — crawlers, risk scoring) ───────────
      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./setup/docker/Dockerfile.powershell
          push: true
          tags: |
            ${{ env.REGISTRY }}/fortigi/identity-atlas-worker:latest
            ${{ env.REGISTRY }}/fortigi/identity-atlas-worker:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
