# ─── Nightly Auto-fix ──────────────────────────────────────────────────────────
# Runs on a nightly schedule (02:00 UTC) and processes all open issues that have
# the `ready-to-fix` label but NOT `fix-in-progress` or `cant-autofix`.
#
# For each eligible issue the workflow:
#   1. Applies `fix-in-progress` label (so the next run skips it)
#   2. Creates a bugfixes/ branch from main
#   3. Uses Claude Code to analyse the issue and implement a fix
#   4. Opens a draft PR linking the issue
#
# Two possible outcomes per issue:
#   A. Fix created  → branch + draft PR + `auto-fixed` label on issue
#   B. Can't fix    → `cant-autofix` label + comment explaining why
#
# The PR still requires human review before merge (branch protection enforces
# this). The draft status makes it clear this is an AI-generated fix.
#
# Required secrets:
#   TRIAGE_ANTHROPIC_API_KEY  — Anthropic API key for Claude Code
#   TRIAGE_LLM_MODEL          — Model ID (e.g. claude-sonnet-4-5-20250929)
#
# Required labels (create manually in GitHub if they don't exist):
#   ready-to-fix       — marks an issue as actionable
#   fix-in-progress    — applied by this workflow to avoid double-processing
#   auto-fixed         — applied when a draft PR is created
#   cant-autofix       — applied when Claude cannot fix the issue
# ───────────────────────────────────────────────────────────────────────────────

name: Nightly Auto-fix

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC every night
  workflow_dispatch: # allow manual trigger

jobs:
  # ── Job 1: Discover eligible issues ────────────────────────────────────────
  find-issues:
    name: Find ready-to-fix issues
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      has_issues: ${{ steps.collect.outputs.has_issues }}
    steps:
      - name: Collect eligible issues
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find issues with ready-to-fix but NOT fix-in-progress or cant-autofix
          ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "ready-to-fix" \
            --state open \
            --json number,title,body,labels \
            --limit 10)

          # Filter out issues that already have fix-in-progress or cant-autofix
          ELIGIBLE=$(echo "$ISSUES" | jq -c '[
            .[] | select(
              ([.labels[].name] | index("fix-in-progress") | not) and
              ([.labels[].name] | index("cant-autofix") | not)
            ) | {
              number: .number,
              title: .title,
              body: (.body // "" | .[0:2000])
            }
          ]')

          COUNT=$(echo "$ELIGIBLE" | jq 'length')
          echo "Found $COUNT eligible issue(s)"

          if [ "$COUNT" -eq 0 ]; then
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
            # Build matrix JSON
            MATRIX=$(echo "$ELIGIBLE" | jq -c '{include: .}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Fix each issue ──────────────────────────────────────────────────
  fix-issue:
    name: "Fix #${{ matrix.number }}"
    needs: find-issues
    if: needs.find-issues.outputs.has_issues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    strategy:
      matrix: ${{ fromJson(needs.find-issues.outputs.matrix) }}
      max-parallel: 1 # process one issue at a time to avoid branch conflicts
      fail-fast: false # don't skip remaining issues if one fails

    steps:
      - name: Apply fix-in-progress label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ matrix.number }} \
            --repo "${{ github.repository }}" \
            --add-label "fix-in-progress"

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.TRIAGE_ANTHROPIC_API_KEY }}
          claude_args: "--model ${{ secrets.TRIAGE_LLM_MODEL }} --allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent"
          prompt: |
            You are fixing GitHub issue #${{ matrix.number }} for the Identity Atlas project.

            **Issue title:** ${{ matrix.title }}
            **Issue body:**
            ${{ matrix.body }}

            ## You MUST do one of these two things — no other outcome is acceptable:

            ### Option A: Fix the issue
            1. Read CLAUDE.md to understand the project structure and conventions.
            2. Investigate the issue: find the relevant code, understand the root cause.
            3. Implement a minimal, focused fix. Do not refactor surrounding code.
            4. After making code changes:
               a. Update the `ModuleVersion` timestamp in `setup/IdentityAtlas.psd1`
                  (keep Major.Minor, update yyyyMMdd.HHmm to current UTC time).
               b. Add a bullet to the top of the changes list in `CHANGES.md`
                  describing the fix in user-facing language.
            5. Create a git commit with a clear message referencing the issue number
               (e.g., "Fix #${{ matrix.number }}: description").

            ### Option B: Explain why you can't fix it
            If you genuinely cannot fix the issue (e.g., the issue is unclear,
            requires external access you don't have, needs a design decision from
            a human, or the described bug doesn't exist in the code), then:
            1. Create a file called `/tmp/cant_fix_reason.txt`
            2. Write a clear, specific explanation of WHY you can't fix it.
               Be concrete — "I found the relevant code in X file at line Y but
               the issue requires Z which I cannot determine" is good.
               "I couldn't fix it" is NOT acceptable.
            3. Do NOT make any code changes or commits.

            ## Rules
            - You MUST either commit a fix (Option A) or write a reason file (Option B).
            - Do not exit without doing one of these two things.
            - Don't worry about testing — the PR will be validated by the CI pipeline
              which includes integration tests, Playwright E2E, and load tests.
            - Follow existing naming conventions and patterns in the codebase.
            - Don't add features, refactoring, or changes beyond the fix.
            - English only in code comments.

      - name: Create branch and PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if Claude made any changes
          if git diff --quiet HEAD; then
            echo "No code changes were made"
            echo "pr_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create branch name from issue number + sanitised title
          SLUG=$(echo "${{ matrix.title }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | head -c 40)
          BRANCH="bugfixes/autofix-issue-${{ matrix.number }}-${SLUG}"

          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

          # Create draft PR
          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$BRANCH" \
            --draft \
            --title "Fix #${{ matrix.number }}: ${{ matrix.title }}" \
            --body "$(cat <<'EOF'
          ## Summary

          Automated fix for #${{ matrix.number }}.

          This PR was generated by the nightly auto-fix workflow using Claude Code.
          Please review carefully before merging.

          ## Test plan

          - [ ] Verify the fix addresses the issue
          - [ ] Check for regressions in related functionality
          - [ ] Confirm CHANGES.md and module version were updated

          Closes #${{ matrix.number }}

          🤖 Generated with [Claude Code](https://claude.ai/code)
          EOF
          )")

          echo "Created draft PR: $PR_URL"
          echo "pr_created=true" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      # ── Outcome A: Fix was created ──────────────────────────────────────────
      - name: Label issue as auto-fixed
        if: steps.create-pr.outputs.pr_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ matrix.number }} \
            --repo "${{ github.repository }}" \
            --add-label "auto-fixed" \
            --remove-label "fix-in-progress"

      - name: Comment with PR link
        if: steps.create-pr.outputs.pr_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ matrix.number }} \
            --repo "${{ github.repository }}" \
            --body "🔧 An automated fix has been created: ${{ steps.create-pr.outputs.pr_url }}

          This draft PR was generated by the nightly auto-fix workflow. Please review before merging.

          The PR will be validated by the CI pipeline (integration tests, Playwright E2E, load tests)."

      # ── Outcome B: Can't fix ────────────────────────────────────────────────
      - name: Label issue as cant-autofix
        if: steps.create-pr.outputs.pr_created == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read Claude's reason if available
          if [ -f /tmp/cant_fix_reason.txt ]; then
            REASON=$(cat /tmp/cant_fix_reason.txt)
          else
            REASON="Claude Code investigated the issue but did not produce a fix or provide a reason."
          fi

          # Add cant-autofix label and remove fix-in-progress
          gh issue edit ${{ matrix.number }} \
            --repo "${{ github.repository }}" \
            --add-label "cant-autofix" \
            --remove-label "fix-in-progress"

          # Comment with the reason
          gh issue comment ${{ matrix.number }} \
            --repo "${{ github.repository }}" \
            --body "🤖 **Auto-fix was unable to resolve this issue.**

          ${REASON}

          This issue has been labeled \`cant-autofix\` and will not be retried automatically.
          To retry, remove the \`cant-autofix\` label."

      # ── Fallback: workflow failure ──────────────────────────────────────────
      - name: Clean up on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ matrix.number }} \
            --repo "${{ github.repository }}" \
            --add-label "cant-autofix" \
            --remove-label "fix-in-progress"

          gh issue comment ${{ matrix.number }} \
            --repo "${{ github.repository }}" \
            --body "🤖 **Auto-fix workflow failed.**

          The nightly auto-fix workflow encountered an error while processing this issue.
          Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          This issue has been labeled \`cant-autofix\` and will not be retried automatically.
          To retry, remove the \`cant-autofix\` label."
