# CI-only compose file — used by .github/workflows/pr-integration.yml
# Uses locally-built images tagged :ci (not registry images).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_atlas
      POSTGRES_USER: identity_atlas
      POSTGRES_PASSWORD: ci_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_atlas"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  web:
    image: identity-atlas-web:ci
    group_add: ["0"]
    environment:
      NODE_ENV: production
      USE_SQL: "true"
      DATABASE_URL: "postgres://identity_atlas:ci_test@postgres:5432/identity_atlas"
      AUTH_ENABLED: "false"
      PORT: "3001"
    ports: ["3001:3001"]
    volumes:
      - job_data:/data/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./setup/IdentityAtlas.psd1:/app/setup/IdentityAtlas.psd1:ro
    depends_on:
      postgres: { condition: service_healthy }

  worker:
    image: identity-atlas-worker:ci
    environment:
      WEB_API_URL: "http://web:3001/api"
    volumes:
      - job_data:/data/uploads
    depends_on:
      web: { condition: service_started }
    restart: "no"

volumes:
  job_data:
