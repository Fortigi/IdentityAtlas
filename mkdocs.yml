site_name: Identity Atlas
site_description: Universal authorization intelligence — sync, analyze, and govern permissions from any identity system
site_url: https://fortigi.github.io/IdentityAtlas
repo_url: https://github.com/Fortigi/IdentityAtlas
repo_name: Fortigi/IdentityAtlas
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Concepts:
      - Data Model: concepts/data-model.md
      - Governance Model: concepts/governance-model.md
      - Risk Scoring Model: concepts/risk-scoring-model.md
  - Data Sources:
      - Entra ID: sync/entra-id.md
      - CSV Import: sync/csv-import.md
      - CSV Schema Reference: architecture/csv-import-schema.md
  - Using Identity Atlas:
      - Role Mining UI: ui/overview.md
      - Local Development: ui/local-dev.md
  - Risk Scoring:
      - Overview: risk-scoring/overview.md
      - Classifiers: risk-scoring/classifiers.md
      - AI Agents: risk-scoring/ai-agents.md
      - Engine Design: risk-scoring/design.md
      - Plugin Architecture: risk-scoring/plugin-architecture.md
  - Architecture:
      - Docker Setup: architecture/docker-setup.md
      - Ingest API: architecture/ingest-api.md
      - Audit History: architecture/audit-history.md
      - LLM & Risk Scoring Internals: architecture/llm-and-risk-scoring.md
  - Operations:
      - Scaling & Load Testing: architecture/scaling.md
      - Demo Dataset: architecture/demo-dataset.md
      - Nightly Review: operations/nightly-review.md
      - Troubleshooting: reference/troubleshooting.md
  - API Reference:
      - Overview: api/index.md
      - Matrix & Permissions: api/matrix.md
      - Entity Detail: api/entities.md
      - Governance & Business Roles: api/governance.md
      - Risk Scores: api/risk-scores.md
  - Reference:
      - Configuration: reference/config.md
      - Database Views: reference/sql-views.md
      - Software Bill of Materials: reference/sbom.md
  - About:
      - About Identity Atlas: about.md
      - History: history.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Fortigi/IdentityAtlas
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/wimvdheijkant/
      name: Wim van den Heijkant
    - icon: fontawesome/solid/globe
      link: https://www.fortigi.nl
      name: Fortigi

copyright: >
  Created by <a href="https://www.fortigi.nl">Maatschap Fortigi</a>
