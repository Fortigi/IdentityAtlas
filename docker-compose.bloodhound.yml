# BloodHound CE overlay — opt-in, not started by default.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.bloodhound.yml --profile bloodhound up -d
#
# This adds BloodHound Community Edition as a sidecar for attack path analysis.
# Identity Atlas can export its data to BH and import risk scores back via the
# Risk Plugins admin page.
#
# BloodHound requires both PostgreSQL (app data) and Neo4j (graph analysis).
# Both run as separate containers with their own volumes.
#
# After first start, check the logs for the initial admin password:
#   docker logs identityatlas-bloodhound-1 2>&1 | grep "Initial Password"
# Then open http://localhost:8080 to log in and generate an API key.

services:

  # ── BloodHound CE ─────────────────────────────────────────────────────
  bloodhound:
    image: specterops/bloodhound:latest
    environment:
      bhe_database_connection: "user=bloodhound password=${BH_DB_PASSWORD:-bloodhound_local} dbname=bloodhound host=bloodhound-db port=5432 sslmode=disable"
      bhe_neo4j_connection: "neo4j://neo4j:${BH_NEO4J_PASSWORD:-bloodhoundcommunityedition}@bloodhound-graph:7687"
      bhe_disable_cypher: "false"
    ports:
      - "${BH_PORT:-8080}:8080"
    depends_on:
      bloodhound-db:
        condition: service_healthy
      bloodhound-graph:
        condition: service_healthy
    profiles: ["bloodhound"]
    restart: unless-stopped

  # ── BloodHound PostgreSQL (app data) ──────────────────────────────────
  bloodhound-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       "bloodhound"
      POSTGRES_USER:     "bloodhound"
      POSTGRES_PASSWORD: "${BH_DB_PASSWORD:-bloodhound_local}"
    volumes:
      - bh_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloodhound -d bloodhound"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    profiles: ["bloodhound"]

  # ── Neo4j (graph database for attack path analysis) ───────────────────
  bloodhound-graph:
    image: neo4j:4.4-community
    environment:
      NEO4J_AUTH: "neo4j/${BH_NEO4J_PASSWORD:-bloodhoundcommunityedition}"
      NEO4J_dbms_allow__upgrade: "true"
    volumes:
      - bh_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    profiles: ["bloodhound"]

volumes:
  bh_postgres_data:
  bh_neo4j_data:
